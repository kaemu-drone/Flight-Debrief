<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Debrief — 飛行レビュー</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__brand">
        <span class="header__mark" data-lucide="drone" aria-hidden="true"></span>
        <div class="header__titles">
          <p class="header__title-en">Flight Debrief</p>
          <h1 class="header__title-ja">飛行レビュー</h1>
        </div>
      </div>
      <p class="subtitle">飛行後の気づきを記録します</p>
    </header>

    <main class="form-area">
      <div class="form-block">
        <h2 class="block-heading">
          <span class="block-heading__icon" data-lucide="clipboard-list" aria-hidden="true"></span>
          <span class="block-heading__text">基本情報</span>
        </h2>

        <section class="field-group field-group--inline">
          <div class="field">
            <label for="date" class="field-label">
              <span class="field-label__icon" data-lucide="calendar" aria-hidden="true"></span>
              日付
            </label>
            <input type="date" id="date" name="date">
          </div>
          <div class="field">
            <label for="location" class="field-label">
              <span class="field-label__icon" data-lucide="map-pin" aria-hidden="true"></span>
              場所
            </label>
            <input type="text" id="location" name="location" placeholder="例：〇〇公園">
          </div>
          <div class="field">
            <label for="aircraft" class="field-label">
              <span class="field-label__icon" data-lucide="drone" aria-hidden="true"></span>
              機体
            </label>
            <input type="text" id="aircraft" name="aircraft" placeholder="例：DJI Mini 4 Pro">
          </div>
        </section>

        <section class="field">
          <label for="purpose" class="field-label">
            <span class="field-label__icon" data-lucide="crosshair" aria-hidden="true"></span>
            飛行目的
          </label>
          <input type="text" id="purpose" name="purpose" placeholder="例：夕景の空撮">
        </section>
      </div>

      <hr class="divider">

      <div class="form-block">
        <h2 class="block-heading">
          <span class="block-heading__icon" data-lucide="message-square-text" aria-hidden="true"></span>
          <span class="block-heading__text">レビュー</span>
        </h2>

        <section class="field">
          <label for="went-well" class="field-label">
            <span class="field-label__icon" data-lucide="circle-check" aria-hidden="true"></span>
            うまくいったこと
          </label>
          <textarea id="went-well" name="went-well" rows="4" placeholder="良かった点、成功した操作など"></textarea>
        </section>

        <section class="field">
          <label for="observations" class="field-label">
            <span class="field-label__icon" data-lucide="eye" aria-hidden="true"></span>
            気づき・所感
          </label>
          <textarea id="observations" name="observations" rows="4" placeholder="飛行中に気づいたこと、改善点など"></textarea>
        </section>

        <section class="field">
          <label for="next-time" class="field-label">
            <span class="field-label__icon" data-lucide="list-plus" aria-hidden="true"></span>
            次回試すこと
          </label>
          <textarea id="next-time" name="next-time" rows="3" placeholder="次回の飛行で試したいこと"></textarea>
        </section>

        <section class="field">
          <label for="stock-footage" class="field-label">
            <span class="field-label__icon" data-lucide="clapperboard" aria-hidden="true"></span>
            ストック映像メモ
          </label>
          <textarea id="stock-footage" name="stock-footage" rows="3" placeholder="保存した映像、使い道のメモなど"></textarea>
        </section>

        <section class="field">
          <label for="free-notes" class="field-label">
            <span class="field-label__icon" data-lucide="notebook-pen" aria-hidden="true"></span>
            メモ
          </label>
          <textarea id="free-notes" name="free-notes" rows="4" placeholder="その他メモ"></textarea>
        </section>
      </div>
    </main>

    <footer class="actions">
      <button type="button" id="print-btn" class="btn-print">
        <span class="btn-print__icon" data-lucide="printer" aria-hidden="true"></span>
        印刷
      </button>
    </footer>
  </div>

  <!-- Print-only layout -->
  <div class="print-sheet" aria-hidden="true">
    <header class="print-header">
      <div class="print-header__titles">
        <p class="print-header__en">Flight Debrief</p>
        <h1 class="print-header__ja">飛行レビュー</h1>
      </div>
      <p class="print-meta" id="print-date-display"></p>
    </header>

    <table class="print-table">
      <tbody>
        <tr>
          <th>日付</th>
          <td id="print-date"></td>
          <th>場所</th>
          <td id="print-location"></td>
        </tr>
        <tr>
          <th>機体</th>
          <td id="print-aircraft"></td>
          <th>飛行目的</th>
          <td id="print-purpose"></td>
        </tr>
      </tbody>
    </table>

    <div class="print-body">
      <section class="print-section">
        <h2>うまくいったこと</h2>
        <div class="print-content" id="print-went-well"></div>
      </section>

      <section class="print-section">
        <h2>次回試すこと</h2>
        <div class="print-content" id="print-next-time"></div>
      </section>

      <section class="print-section">
        <h2>気づき・所感</h2>
        <div class="print-content" id="print-observations"></div>
      </section>

      <section class="print-section">
        <h2>ストック映像メモ</h2>
        <div class="print-content" id="print-stock-footage"></div>
      </section>

      <section class="print-section print-section--full">
        <h2>メモ</h2>
        <div class="print-content" id="print-free-notes"></div>
      </section>
    </div>
      <footer class="print-footer">
        <p>Safe flight.<br>Better next flight.</p>
      </footer>
  </div>

  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
